Global:
  model_name: SLANet_yolo_mabe_fusion_codex
  use_gpu: true
  epoch_num: 3
  log_smooth_window: 20
  print_batch_step: 20
  save_model_dir: ./output/SLANet_yolo_mabe_fusion_codex
  save_epoch_step: 5
  eval_batch_step:
  - 1
  - 500
  cal_metric_during_train: true
  pretrained_model: ./output/SLANet_pubtabnet_loc_codex/best_accuracy.pdparams
  checkpoints: null
  save_inference_dir: ./output/SLANet_yolo_mabe_fusion_codex/infer
  use_visualdl: false
  infer_img: train_data/table/pubtabnet/val/PMC5755158_010_01.png
  character_dict_path: ppocr/utils/dict/table_structure_dict.txt
  character_type: en
  max_text_length: 500
  box_format: xyxy
  infer_mode: false
  use_sync_bn: true
  save_res_path: output/SLANet_yolo_mabe_fusion_codex/infer
  d2s_train_image_shape:
  - 3
  - -1
  - -1
  amp_custom_white_list:
  - concat
  - elementwise_sub
  - set_value
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  clip_norm: 5.0
  lr:
    name: Piecewise
    learning_rate: 0.0001
    decay_epochs:
    - 4
    - 6
    values:
    - 0.0001
    - 5.0e-05
    - 1.0e-05
  regularizer:
    name: L2
    factor: 0.0
Architecture:
  model_type: table
  algorithm: SLANet
  Backbone:
    name: PPLCNet
    scale: 1.0
    pretrained: true
    use_ssld: true
  Neck:
    name: CSPPAN
    out_channels: 96
  PostNeck:
    name: YOLOMabeFusion
    target_index: -1
    enable_mamba: true
    enable_local: true
    fusion_mode: gated_sum
    mamba_expand: 1
    local_kernel: 3
    drop_path: 0.0
    enable_coord: true
    coord_reduction: 8
    enable_multiscale: true
    multiscale_reduction: 4
  Head:
    name: SLAHead
    hidden_size: 256
    max_text_length: 500
    loc_reg_num: 4
Loss:
  name: SLALoss
  structure_weight: 1.0
  loc_weight: 10.0
  loc_loss: smooth_l1
PostProcess:
  name: TableLabelDecode
  merge_no_span_structure: true
Metric:
  name: TableMetric
  main_indicator: acc
  compute_bbox_metric: false
  loc_reg_num: 4
  box_format: xyxy
Train:
  dataset:
    name: PubTabDataSet
    data_dir: train_data/table/pubtabnet/train/
    label_file_list:
    - train_data/table/pubtabnet/PubTabNet_2.0.0_train.jsonl
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - TableLabelEncode:
        learn_empty_box: false
        merge_no_span_structure: true
        replace_empty_cell_token: false
        loc_reg_num: 4
        max_text_length: 500
    - TableBoxEncode:
        in_box_format: xyxy
        out_box_format: xyxy
    - ResizeTableImage:
        max_len: 488
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - PaddingTableImage:
        size:
        - 488
        - 488
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - structure
        - bboxes
        - bbox_masks
        - length
        - shape
  loader:
    shuffle: true
    batch_size_per_card: 24
    drop_last: true
    num_workers: 1
Eval:
  dataset:
    name: PubTabDataSet
    data_dir: train_data/table/pubtabnet/val/
    label_file_list:
    - train_data/table/pubtabnet/PubTabNet_2.0.0_val.jsonl
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - TableLabelEncode:
        learn_empty_box: false
        merge_no_span_structure: true
        replace_empty_cell_token: false
        loc_reg_num: 4
        max_text_length: 500
    - TableBoxEncode:
        in_box_format: xyxy
        out_box_format: xyxy
    - ResizeTableImage:
        max_len: 488
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - PaddingTableImage:
        size:
        - 488
        - 488
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - structure
        - bboxes
        - bbox_masks
        - length
        - shape
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 24
    num_workers: 1
