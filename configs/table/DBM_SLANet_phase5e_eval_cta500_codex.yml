Global:
  model_name: SLANet
  use_gpu: true
  epoch_num: 1
  log_smooth_window: 20
  print_batch_step: 20
  save_model_dir: ./output/cta500_phase5e_eval_20260625
  save_epoch_step: 5
  eval_batch_step:
  - 0
  - 1500
  cal_metric_during_train: true
  pretrained_model: null
  checkpoints: ./output/E5_full_mamba_stage5_30000_lr5e6_from_stage4_20260623/best_accuracy
  save_inference_dir: ./output/E5_full_mamba_stage5_30000_lr5e6_from_stage4_20260623/infer
  use_visualdl: false
  infer_img: train_data/table/pubtabnet/val/PMC5755158_010_01.png
  character_dict_path: ppocr/utils/dict/table_structure_dict.txt
  character_type: en
  max_text_length: 500
  box_format: xyxy
  infer_mode: false
  use_sync_bn: true
  save_res_path: output/cta500_phase5e_eval_20260625/infer
  d2s_train_image_shape:
  - 3
  - -1
  - -1
  amp_custom_white_list:
  - concat
  - elementwise_sub
  - set_value
  diagnostics_path: output/cta500_phase5e_eval_20260625/phase5e_cta500_sample_teds.jsonl
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  clip_norm: 5.0
  lr:
    name: Piecewise
    learning_rate: 5.0e-06
    decay_epochs:
    - 4
    - 6
    values:
    - 5.0e-06
    - 2.0e-06
    - 1.0e-06
  regularizer:
    name: L2
    factor: 0.0
Architecture:
  model_type: table
  algorithm: SLANet
  Backbone:
    name: PPLCNet
    scale: 1.0
    pretrained: true
    use_ssld: true
  Neck:
    name: CSPPAN
    out_channels: 96
  Head:
    name: CellFullMambaHead
    hidden_size: 256
    max_text_length: 500
    loc_reg_num: 4
    cell_token_dim: 128
    cell_token_dropout: 0.1
    mamba_d_state: 16
    mamba_expand: 2
    mamba_d_conv: 3
    mamba_dt_rank: auto
    bidirectional: true
Loss:
  name: SLACellTokenLoss
  structure_weight: 1.0
  loc_weight: 10.0
  loc_loss: smooth_l1
  cell_presence_weight: 0.2
PostProcess:
  name: TableLabelDecode
  merge_no_span_structure: true
Metric:
  name: TableMetric
  main_indicator: acc
  compute_bbox_metric: false
  loc_reg_num: 4
  box_format: xyxy
Train:
  dataset:
    name: PubTabDataSet
    data_dir: train_data/table/pubtabnet/train/
    label_file_list:
    - train_data/table/pubtabnet/phase4_stage5_train_30000.jsonl
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - TableLabelEncode:
        learn_empty_box: false
        merge_no_span_structure: true
        replace_empty_cell_token: false
        loc_reg_num: 4
        max_text_length: 500
    - TableBoxEncode:
        in_box_format: xyxy
        out_box_format: xyxy
    - ResizeTableImage:
        max_len: 488
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - PaddingTableImage:
        size:
        - 488
        - 488
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - structure
        - bboxes
        - bbox_masks
        - length
        - shape
  loader:
    shuffle: true
    batch_size_per_card: 4
    drop_last: true
    num_workers: 0
Eval:
  dataset:
    name: PubTabDataSet
    data_dir: train_data/table/pubtabnet/val/
    label_file_list:
    - train_data/table/pubtabnet/complex_structure_cta500_20260625.jsonl
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - TableLabelEncode:
        learn_empty_box: false
        merge_no_span_structure: true
        replace_empty_cell_token: false
        loc_reg_num: 4
        max_text_length: 500
    - TableBoxEncode:
        in_box_format: xyxy
        out_box_format: xyxy
    - ResizeTableImage:
        max_len: 488
    - NormalizeImage:
        scale: 1./255.
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
        order: hwc
    - PaddingTableImage:
        size:
        - 488
        - 488
    - ToCHWImage: null
    - KeepKeys:
        keep_keys:
        - image
        - structure
        - bboxes
        - bbox_masks
        - length
        - shape
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 4
    num_workers: 0
